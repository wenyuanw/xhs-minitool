<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1"
    />
    <meta name="theme-color" content="#7EC8E8" />
    <meta
      name="description"
      content="绿茵门神：接住掉落的足球，小心红黄牌，冲刺高分"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="icon" type="image/svg+xml" href="./icons/icon-192.svg" />
    <link rel="apple-touch-icon" href="./icons/icon-192.svg" />
    <title>绿茵门神</title>
  </head>
  <body>
    <div id="app">
      <main id="page" class="page" aria-live="polite">
        <section id="screen-home" class="screen screen--home">
          <div class="home-decor" aria-hidden="true">
            <span class="decor-ball decor-ball--a"></span>
            <span class="decor-ball decor-ball--b"></span>
            <span class="decor-ball decor-ball--c"></span>
            <span class="decor-card decor-card--y"></span>
            <span class="decor-card decor-card--r"></span>
          </div>

          <div class="home-stage">
            <header class="tool-brand home-enter home-enter--1">
              <img
                class="tool-brand__logo"
                src="./icons/logo.svg"
                width="88"
                height="88"
                alt=""
              />
              <h1 class="tool-brand__title">绿茵门神</h1>
              <p class="tool-brand__desc">30 秒冲刺高分，漏接会扣生命</p>
            </header>

            <div class="home-actions home-enter home-enter--2">
              <button type="button" class="btn btn--primary btn--pulse" id="btn-start">
                开始比赛
              </button>
              <p class="home-best" id="home-best">最高分 0</p>
              <button type="button" class="btn-sound" id="btn-sound" aria-pressed="false">
                音效开
              </button>
            </div>

            <ul class="howto home-enter home-enter--3" aria-label="玩法说明">
              <li>
                <img class="howto__icon" src="./icons/item-ball.svg" alt="" width="36" height="36" />
                <span class="howto__text">接球得分</span>
              </li>
              <li>
                <span class="howto__icons">
                  <img class="howto__icon" src="./icons/item-clock.svg" alt="" width="32" height="32" />
                  <img class="howto__icon" src="./icons/item-boost.svg" alt="" width="32" height="32" />
                </span>
                <span class="howto__text">加时 / 加倍</span>
              </li>
              <li>
                <img class="howto__icon" src="./icons/item-yellow.svg" alt="" width="36" height="36" />
                <span class="howto__text">掉落变慢</span>
              </li>
              <li>
                <img class="howto__icon" src="./icons/item-red.svg" alt="" width="36" height="36" />
                <span class="howto__text">扣分惩罚</span>
              </li>
            </ul>
          </div>
        </section>

        <section id="screen-play" class="screen screen--play" hidden>
          <div class="pitch-wrap">
            <div class="hud hud--overlay" id="hud">
              <div class="hud__item">
                <span class="hud__label">得分</span>
                <span class="hud__value" id="hud-score">0</span>
              </div>
              <div class="hud__item">
                <span class="hud__label">倒计时</span>
                <span class="hud__value" id="hud-time">30</span>
              </div>
              <div class="hud__item">
                <span class="hud__label">生命</span>
                <span class="hud__value hud__value--lives" id="hud-lives">●●●</span>
              </div>
            </div>
            <p class="effect-banner effect-banner--overlay" id="effect-banner" hidden></p>
            <canvas id="game" width="360" height="640" aria-label="绿茵门神游戏画布"></canvas>
            <div class="play-bar play-bar--overlay">
              <p class="play-hint">拖动球门接球 · 漏接扣命</p>
              <button type="button" class="btn-sound btn-sound--compact" id="btn-sound-play" aria-pressed="false">
                音效开
              </button>
            </div>
          </div>
        </section>

        <section id="screen-over" class="screen screen--over" hidden>
          <div class="over-fx" id="over-fx" aria-hidden="true"></div>

          <div class="over-stage">
            <div class="over-rank home-enter home-enter--1" id="over-rank">
              <p class="over-rank__eyebrow" id="over-eyebrow">本场称号</p>
              <h1 class="over-rank__title" id="over-title">练习生</h1>
              <p class="over-rank__desc" id="over-subtitle">再来一局试试手感</p>
              <p class="over-record" id="over-record" hidden>新纪录达成！</p>
            </div>

            <div class="over-score home-enter home-enter--2">
              <p class="over-score__label">本场得分</p>
              <p class="over-score__value" id="over-score">0</p>
              <p class="over-score__best" id="over-best">最高分 0</p>
            </div>

            <ul class="over-stats home-enter home-enter--2" aria-label="本场战绩">
              <li>
                <span class="over-stats__num" id="stat-caught">0</span>
                <span class="over-stats__label">接住</span>
              </li>
              <li>
                <span class="over-stats__num" id="stat-combo">0</span>
                <span class="over-stats__label">最高连击</span>
              </li>
              <li>
                <span class="over-stats__num" id="stat-lives">0</span>
                <span class="over-stats__label">剩余生命</span>
              </li>
            </ul>

            <div class="home-actions home-enter home-enter--3">
              <button type="button" class="btn btn--primary btn--pulse" id="btn-again">再来一局</button>
              <button type="button" class="btn btn--ghost" id="btn-home">返回首页</button>
            </div>
          </div>
        </section>
      </main>
    </div>
    <div id="toast" class="toast" hidden></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
