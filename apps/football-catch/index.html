<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1"
    />
    <meta name="theme-color" content="#7EC8E8" />
    <meta
      name="description"
      content="接住掉落的足球得分，红黄牌与激励道具会改变节奏"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="icon" type="image/svg+xml" href="./icons/icon-192.svg" />
    <link rel="apple-touch-icon" href="./icons/icon-192.svg" />
    <title>门将接球</title>
  </head>
  <body>
    <div id="app">
      <main id="page" class="page" aria-live="polite">
        <section id="screen-home" class="screen screen--home">
          <div class="home-decor" aria-hidden="true">
            <span class="decor-ball decor-ball--a"></span>
            <span class="decor-ball decor-ball--b"></span>
            <span class="decor-ball decor-ball--c"></span>
            <span class="decor-card decor-card--y"></span>
            <span class="decor-card decor-card--r"></span>
          </div>

          <div class="home-stage">
            <header class="tool-brand home-enter home-enter--1">
              <img
                class="tool-brand__logo"
                src="./icons/logo.svg"
                width="88"
                height="88"
                alt=""
              />
              <h1 class="tool-brand__title">门将接球</h1>
              <p class="tool-brand__desc">左右移动球门，接住足球，小心红黄牌</p>
            </header>

            <div class="home-actions home-enter home-enter--2">
              <button type="button" class="btn btn--primary btn--pulse" id="btn-start">
                开始比赛
              </button>
              <p class="home-best" id="home-best">最高分 0</p>
              <button type="button" class="btn-sound" id="btn-sound" aria-pressed="false">
                音效开
              </button>
            </div>

            <ul class="howto home-enter home-enter--3" aria-label="玩法说明">
              <li>
                <img class="howto__icon" src="./icons/item-ball.svg" alt="" width="36" height="36" />
                <span class="howto__text">接到得分</span>
              </li>
              <li>
                <span class="howto__icons">
                  <img class="howto__icon" src="./icons/item-clock.svg" alt="" width="32" height="32" />
                  <img class="howto__icon" src="./icons/item-boost.svg" alt="" width="32" height="32" />
                </span>
                <span class="howto__text">加时 / 加倍</span>
              </li>
              <li>
                <img class="howto__icon" src="./icons/item-yellow.svg" alt="" width="36" height="36" />
                <span class="howto__text">掉落变慢</span>
              </li>
              <li>
                <img class="howto__icon" src="./icons/item-red.svg" alt="" width="36" height="36" />
                <span class="howto__text">扣分惩罚</span>
              </li>
            </ul>
          </div>
        </section>

        <section id="screen-play" class="screen screen--play" hidden>
          <div class="hud" id="hud">
            <div class="hud__item">
              <span class="hud__label">得分</span>
              <span class="hud__value" id="hud-score">0</span>
            </div>
            <div class="hud__item">
              <span class="hud__label">倒计时</span>
              <span class="hud__value" id="hud-time">60</span>
            </div>
            <div class="hud__item">
              <span class="hud__label">连击</span>
              <span class="hud__value" id="hud-combo">0</span>
            </div>
          </div>
          <p class="effect-banner" id="effect-banner" hidden></p>
          <div class="pitch-wrap">
            <canvas id="game" width="360" height="560" aria-label="门将接球游戏画布"></canvas>
          </div>
          <div class="play-bar">
            <p class="play-hint">拖动或滑动移动球门</p>
            <button type="button" class="btn-sound btn-sound--compact" id="btn-sound-play" aria-pressed="false">
              音效开
            </button>
          </div>
        </section>

        <section id="screen-over" class="screen screen--over" hidden>
          <header class="tool-brand tool-brand--compact">
            <h1 class="tool-brand__title">比赛结束</h1>
            <p class="tool-brand__desc" id="over-subtitle">本场表现不错</p>
          </header>
          <div class="over-score">
            <p class="over-score__label">本场得分</p>
            <p class="over-score__value" id="over-score">0</p>
            <p class="over-score__best" id="over-best">最高分 0</p>
          </div>
          <div class="home-actions">
            <button type="button" class="btn btn--primary" id="btn-again">再来一局</button>
            <button type="button" class="btn btn--ghost" id="btn-home">返回首页</button>
          </div>
        </section>
      </main>
    </div>
    <div id="toast" class="toast" hidden></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
